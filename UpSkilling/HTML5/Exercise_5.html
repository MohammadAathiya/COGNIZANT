<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
form{
    width:400px;
    background:#f4f4f4;
    padding:20px;
}

input,select,textarea{
    width:100%;
    margin-bottom:10px;
}
</style>

<script>
function register(){
    document.getElementById("result").value =
    "Registration Successful";
}
</script>

</head>
<body>

<h2>Event Registration</h2>

<form>

<input type="text"
placeholder="Enter Name"
required
autofocus>

<input type="email"
placeholder="Enter Email"
required>

<input type="date" required>

<select>
    <option>Music</option>
    <option>Sports</option>
    <option>Workshop</option>
</select>

<textarea placeholder="Message"></textarea>

<input type="button"
value="Register"
onclick="register()">

<output id="result"></output>

</form>

</body>
</html>
