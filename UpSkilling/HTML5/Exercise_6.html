<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script>

function validatePhone(){
    let phone=document.getElementById("phone").value;

    if(phone.length!=10){
        alert("Enter valid phone number");
    }
}

function showFee(){
    let fee=document.getElementById("event").value;

    document.getElementById("display").innerHTML=
    "Selected: "+fee;
}

function submitFeedback(){
    alert("Feedback Submitted");
}

function enlarge(img){
    img.style.width="300px";
}

function countChars(){
    let count=
    document.getElementById("feedback").value.length;

    document.getElementById("chars").innerHTML=
    count+" characters";
}

</script>
</head>
<body>

Phone:
<input type="text"
id="phone"
onblur="validatePhone()">

<br><br>

<select id="event"
onchange="showFee()">
<option>Music</option>
<option>Sports</option>
<option>Workshop</option>
</select>

<p id="display"></p>

<img src="image1.jpg"
width="150"
ondblclick="enlarge(this)">

<br><br>

<textarea id="feedback"
onkeyup="countChars()"></textarea>

<p id="chars">0 characters</p>

<button onclick="submitFeedback()">
Submit
</button>

</body>
</html>
