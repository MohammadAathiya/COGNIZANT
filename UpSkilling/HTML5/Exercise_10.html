<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script>

let count=0;

function increase(){

    count++;

    console.log("Count =",count);

    document.getElementById("result").innerHTML=
    count;
}

</script>

</head>
<body>

<h2>Debug Example</h2>

<button onclick="increase()">
Increase
</button>

<p id="result">0</p>

</body>
</html>
